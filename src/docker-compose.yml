services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vpointcare-php85
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - vpoint-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "82:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - vpoint-net
    depends_on:
      - app

  queue:
    image: vpointcare-php85
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3
    volumes:
      - ./:/var/www/html
    networks:
      - vpoint-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app

  reverb:
    image: vpointcare-php85
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=7060
    ports:
      - "7060:7060"
    volumes:
      - ./:/var/www/html
    networks:
      - vpoint-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app

networks:
  vpoint-net:
    driver: bridge
